<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>地理院地図 1024px範囲 3D地形・地層柱状図プロトタイプ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    :root{
      --bg:#f5f6f7;--panel:#ffffff;--text:#1f2937;--muted:#6b7280;--line:#d1d5db;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:var(--bg);color:var(--text)}
    header{padding:12px 16px;background:#fff;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    header h1{font-size:18px;margin:0;font-weight:700}
    header small{color:var(--muted)}
    #app{display:grid;grid-template-columns:460px 1fr;gap:10px;padding:10px;height:calc(100vh - 58px);min-height:720px}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    #left{display:grid;grid-template-rows:360px auto;gap:10px;background:transparent;border:0;box-shadow:none}
    #map{height:360px;width:100%}
    #view3d{width:100%;height:100%;display:block;background:#e8eef4}
    .controls{padding:12px;overflow:auto}
    .row{display:grid;grid-template-columns:120px 1fr;gap:8px;align-items:center;margin:8px 0}
    label{font-size:13px;color:#374151}
    input[type="number"], input[type="text"], select{width:100%;padding:7px;border:1px solid var(--line);border-radius:8px;background:#fff}
    input[type="color"]{width:48px;height:32px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:2px}
    button{border:1px solid #2563eb;background:#2563eb;color:white;border-radius:9px;padding:8px 10px;cursor:pointer;font-weight:600}
    button.secondary{background:#fff;color:#2563eb}
    button:disabled{opacity:.5;cursor:progress}
    .hint{font-size:12px;color:var(--muted);line-height:1.6;margin-top:8px}
    .layer-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}
    .layer-table th,.layer-table td{border-bottom:1px solid #e5e7eb;padding:6px;text-align:left}
    .layer-table th{color:#4b5563;font-weight:600;background:#f9fafb}
    .layer-table input[type="number"]{padding:5px}
    #columnWrap{display:grid;grid-template-columns:96px 1fr;gap:10px;align-items:stretch;margin-top:10px}
    #column{height:230px;border:1px solid var(--line);border-radius:10px;overflow:hidden;display:flex;flex-direction:column}
    .seg{display:flex;align-items:center;justify-content:center;color:#111827;font-weight:700;border-bottom:1px solid rgba(0,0,0,.18);text-shadow:0 1px 0 rgba(255,255,255,.4)}
    .readout{font-size:12px;line-height:1.55;color:#374151;background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:10px}
    #status{font-size:12px;color:#374151;background:#eef2ff;border:1px solid #c7d2fe;border-radius:8px;padding:8px;margin-top:8px;white-space:pre-wrap}
    .leaflet-container{font-family:inherit}
    .extentBox{border:2px dashed #ef4444;background:rgba(239,68,68,.05)}
    @media (max-width: 920px){#app{grid-template-columns:1fr;height:auto}#view3d{height:70vh}.panel3d{height:70vh}}
  </style>
</head>
<body>
<header>
  <h1>地理院地図 1024px範囲 → 3D地形＋地層A〜D</h1>
  <small>地理院タイル標準地図・標高PNGを利用する教材用プロトタイプ</small>
</header>
<div id="app">
  <div id="left">
    <div class="panel"><div id="map"></div></div>
    <div class="panel controls">
      <div class="row"><label>中心緯度</label><input id="lat" type="number" step="0.000001" value="34.425756"></div>
      <div class="row"><label>中心経度</label><input id="lon" type="number" step="0.000001" value="134.060741"></div>
      <div class="row"><label>ズーム</label><input id="zoom" type="number" min="10" max="15" step="1" value="15"></div>
      <div class="row"><label>範囲</label><input id="extentPx" type="number" value="1024" step="256" min="512" max="2048"></div>
      <div class="row"><label>地形高さ倍率</label><input id="heightScale" type="number" value="1.2" step="0.1" min="0.1" max="10"></div>
      <div class="row"><label>地層表示</label>
        <select id="layerMode"><option value="follow">地形面に沿って積層</option><option value="flat">水平な地層として表示</option></select>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button id="goBtn">中心へ移動</button>
        <button id="buildBtn" class="secondary">3Dを再生成</button>
      </div>
      <div id="status">地図上をクリックすると、その地点の柱状図位置を更新します。</div>
      <table class="layer-table">
        <thead><tr><th>地層</th><th>厚さ m</th><th>色</th></tr></thead>
        <tbody id="layerRows"></tbody>
      </table>
      <div id="columnWrap">
        <div id="column"></div>
        <div class="readout" id="readout"></div>
      </div>
      <div class="hint">
        赤い点線枠が「中心から縦横1024px」の抽出範囲です。標高データがない地点は0m扱いになります。実際の地質柱状図データを使う場合は、クリック地点からAPIやCSVを読んでA〜Dの厚さ・色を更新する部分を差し替えてください。
      </div>
    </div>
  </div>
  <div class="panel panel3d"><canvas id="view3d"></canvas></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.164.1/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three@0.164.1/examples/jsm/controls/OrbitControls.js';

const GSI = 'https://cyberjapandata.gsi.go.jp/xyz';
const TILE = 256;
const init = { lat: 34.425756, lon: 134.060741, zoom: 15 };
const state = {
  center: {...init},
  clicked: {...init},
  lastDem: null,
  layers: [
    {name:'地層A', thickness:18, color:'#f6d365'},
    {name:'地層B', thickness:26, color:'#fda085'},
    {name:'地層C', thickness:34, color:'#9ad7ff'},
    {name:'地層D', thickness:42, color:'#9be59b'},
  ]
};

const map = L.map('map', { zoomControl:true }).setView([init.lat, init.lon], init.zoom);
L.tileLayer(`${GSI}/std/{z}/{x}/{y}.png`, {
  attribution:'地図・標高: <a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank">国土地理院 地理院タイル</a>',
  maxZoom:18
}).addTo(map);
let marker = L.marker([init.lat, init.lon], {draggable:true}).addTo(map);
let clickMarker = L.circleMarker([init.lat, init.lon], {radius:7,color:'#111827',weight:2,fillColor:'#ef4444',fillOpacity:.9}).addTo(map);
let extentRect;

function lonLatToWorldPx(lon, lat, z){
  const scale = TILE * 2 ** z;
  const sin = Math.sin(lat * Math.PI / 180);
  return {
    x: (lon + 180) / 360 * scale,
    y: (0.5 - Math.log((1 + sin) / (1 - sin)) / (4 * Math.PI)) * scale
  };
}
function worldPxToLonLat(x, y, z){
  const scale = TILE * 2 ** z;
  const lon = x / scale * 360 - 180;
  const n = Math.PI - 2 * Math.PI * y / scale;
  const lat = 180 / Math.PI * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
  return {lon, lat};
}
function updateExtentBox(){
  const z = Number(document.getElementById('zoom').value);
  const extent = Number(document.getElementById('extentPx').value);
  const c = lonLatToWorldPx(state.center.lon, state.center.lat, z);
  const nw = worldPxToLonLat(c.x - extent/2, c.y - extent/2, z);
  const se = worldPxToLonLat(c.x + extent/2, c.y + extent/2, z);
  const bounds = [[se.lat, nw.lon],[nw.lat, se.lon]];
  if(extentRect) extentRect.setBounds(bounds); else extentRect = L.rectangle(bounds,{className:'extentBox',color:'#ef4444',weight:2,fillOpacity:.03}).addTo(map);
}
function syncInputs(){
  document.getElementById('lat').value = state.center.lat.toFixed(6);
  document.getElementById('lon').value = state.center.lon.toFixed(6);
  document.getElementById('zoom').value = Math.round(map.getZoom());
}
map.on('moveend zoomend',()=>{
  const c=map.getCenter(); state.center={lat:c.lat,lon:c.lng,zoom:Math.round(map.getZoom())};
  marker.setLatLng([c.lat,c.lng]); syncInputs(); updateExtentBox();
});
map.on('click', e=>{
  state.clicked={lat:e.latlng.lat, lon:e.latlng.lng}; clickMarker.setLatLng(e.latlng); updateReadout(); renderColumn();
});
marker.on('dragend', e=>{ const p=e.target.getLatLng(); setCenter(p.lat,p.lng,Number(document.getElementById('zoom').value)); });
function setCenter(lat, lon, zoom){ state.center={lat,lon,zoom}; map.setView([lat,lon],zoom); marker.setLatLng([lat,lon]); syncInputs(); updateExtentBox(); }

const layerRows = document.getElementById('layerRows');
function buildLayerEditor(){
  layerRows.innerHTML='';
  state.layers.forEach((ly,i)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${ly.name}</td><td><input type="number" min="1" step="1" value="${ly.thickness}" data-i="${i}" data-k="thickness"></td><td><input type="color" value="${ly.color}" data-i="${i}" data-k="color"></td>`;
    layerRows.appendChild(tr);
  });
  layerRows.addEventListener('input', e=>{
    const i=e.target.dataset.i, k=e.target.dataset.k; if(i===undefined) return;
    state.layers[i][k] = k==='thickness' ? Number(e.target.value) : e.target.value;
    renderColumn(); updateReadout();
  }, {once:false});
}
function renderColumn(){
  const col=document.getElementById('column'); col.innerHTML='';
  const total=state.layers.reduce((s,l)=>s+l.thickness,0);
  state.layers.forEach(l=>{
    const d=document.createElement('div'); d.className='seg';
    d.style.background=l.color; d.style.flex=`${l.thickness} 1 0`;
    d.textContent=`${l.name} ${l.thickness}m`; col.appendChild(d);
  });
}
function getElevationAt(lat, lon){
  if(!state.lastDem) return null;
  const {z, minX, minY, extent, values, N}=state.lastDem;
  const p=lonLatToWorldPx(lon,lat,z);
  const u=(p.x-minX)/extent, v=(p.y-minY)/extent;
  if(u<0||u>1||v<0||v>1) return null;
  const ix=Math.max(0,Math.min(N-1,Math.round(u*(N-1))));
  const iy=Math.max(0,Math.min(N-1,Math.round(v*(N-1))));
  return values[iy*N+ix];
}
function updateReadout(){
  const h=getElevationAt(state.clicked.lat,state.clicked.lon);
  const total=state.layers.reduce((s,l)=>s+l.thickness,0);
  const rows=state.layers.map((l,i)=>`${l.name}: ${l.thickness} m`).join('<br>');
  document.getElementById('readout').innerHTML = `クリック地点<br>緯度 ${state.clicked.lat.toFixed(6)}<br>経度 ${state.clicked.lon.toFixed(6)}<br>推定標高 ${h===null?'範囲外/未読込':h.toFixed(2)+' m'}<br><br>${rows}<br><b>合計深度 ${total} m</b>`;
}

function decodeDem(r,g,b){
  const x = 65536*r + 256*g + b;
  if(x === 8388608) return NaN;
  return (x < 8388608 ? x : x - 16777216) * 0.01;
}
function loadImage(url){
  return new Promise((resolve,reject)=>{
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>resolve(img); img.onerror=()=>reject(new Error(url)); img.src=url;
  });
}
async function loadTileWithFallback(kind,z,x,y){
  const ids = kind === 'dem'
    ? ['dem_png','dem5a_png','dem5b_png','dem5c_png','dem10b_png']
    : ['std'];
  for(const id of ids){
    try{return await loadImage(`${GSI}/${id}/${z}/${x}/${y}.png`);}catch(e){}
  }
  return null;
}
async function makeMosaic(kind, z, minX, minY, extent){
  const canvas=document.createElement('canvas'); canvas.width=extent; canvas.height=extent;
  const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,extent,extent);
  const tx0=Math.floor(minX/TILE), ty0=Math.floor(minY/TILE);
  const tx1=Math.floor((minX+extent-1)/TILE), ty1=Math.floor((minY+extent-1)/TILE);
  const jobs=[];
  for(let ty=ty0;ty<=ty1;ty++) for(let tx=tx0;tx<=tx1;tx++) jobs.push((async()=>{
    const img=await loadTileWithFallback(kind,z,tx,ty);
    if(img) ctx.drawImage(img, tx*TILE-minX, ty*TILE-minY);
  })());
  await Promise.all(jobs);
  return canvas;
}

let renderer, scene, camera, controls, terrainMesh, rootGroup;
function setup3D(){
  const canvas=document.getElementById('view3d');
  renderer=new THREE.WebGLRenderer({canvas,antialias:true});
  renderer.setPixelRatio(window.devicePixelRatio);
  scene=new THREE.Scene(); scene.background=new THREE.Color(0xe8eef4);
  camera=new THREE.PerspectiveCamera(45,1,1,5000); camera.position.set(0, -560, 380);
  controls=new OrbitControls(camera, renderer.domElement); controls.target.set(0,0,0); controls.update();
  const hemi=new THREE.HemisphereLight(0xffffff,0x667788,2.2); scene.add(hemi);
  const dir=new THREE.DirectionalLight(0xffffff,1.6); dir.position.set(250,-300,500); scene.add(dir);
  rootGroup=new THREE.Group(); scene.add(rootGroup);
  window.addEventListener('resize', resize3D); resize3D(); animate();
}
function resize3D(){
  const canvas=renderer.domElement; const rect=canvas.parentElement.getBoundingClientRect();
  renderer.setSize(rect.width, rect.height, false); camera.aspect=rect.width/rect.height; camera.updateProjectionMatrix();
}
function animate(){requestAnimationFrame(animate); controls.update(); renderer.render(scene,camera);}
function clearRoot(){while(rootGroup.children.length){const o=rootGroup.children.pop(); o.traverse?.(m=>{m.geometry?.dispose?.(); if(m.material){Array.isArray(m.material)?m.material.forEach(mm=>mm.dispose()):m.material.dispose();}})}}
function buildSurfaceMesh(N, size, topValues, bottomValues, material){
  const verts=[]; const idx=[]; const half=size/2;
  // top vertices
  for(let j=0;j<N;j++) for(let i=0;i<N;i++) verts.push(-half + size*i/(N-1), half - size*j/(N-1), topValues[j*N+i]);
  // bottom vertices
  const off=N*N;
  for(let j=0;j<N;j++) for(let i=0;i<N;i++) verts.push(-half + size*i/(N-1), half - size*j/(N-1), bottomValues[j*N+i]);
  // top / bottom
  for(let j=0;j<N-1;j++) for(let i=0;i<N-1;i++){
    const a=j*N+i,b=a+1,c=a+N,d=c+1;
    idx.push(a,c,b,b,c,d);
    idx.push(off+a,off+b,off+c,off+b,off+d,off+c);
  }
  // sides
  for(let i=0;i<N-1;i++){
    let a=i,b=i+1,c=off+i,d=off+i+1; idx.push(a,b,c,b,d,c);
    a=(N-1)*N+i; b=a+1; c=off+a; d=off+b; idx.push(a,c,b,b,c,d);
  }
  for(let j=0;j<N-1;j++){
    let a=j*N,b=(j+1)*N,c=off+a,d=off+b; idx.push(a,c,b,b,c,d);
    a=j*N+N-1; b=(j+1)*N+N-1; c=off+a; d=off+b; idx.push(a,b,c,b,d,c);
  }
  const geo=new THREE.BufferGeometry(); geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3)); geo.setIndex(idx); geo.computeVertexNormals();
  return new THREE.Mesh(geo,material);
}
async function build3D(){
  const btn=document.getElementById('buildBtn'); btn.disabled=true;
  const status=document.getElementById('status'); status.textContent='地理院タイルを読み込み中…';
  try{
    const z=Math.max(10, Math.min(15, Number(document.getElementById('zoom').value)));
    const extent=Number(document.getElementById('extentPx').value);
    const c=lonLatToWorldPx(state.center.lon,state.center.lat,z);
    const minX=Math.round(c.x-extent/2), minY=Math.round(c.y-extent/2);
    const [demCanvas,mapCanvas] = await Promise.all([makeMosaic('dem',z,minX,minY,extent), makeMosaic('map',z,minX,minY,extent)]);
    const demCtx=demCanvas.getContext('2d'); const data=demCtx.getImageData(0,0,extent,extent).data;
    const N=129; const values=new Float32Array(N*N);
    let minH=Infinity,maxH=-Infinity,valid=0;
    for(let j=0;j<N;j++) for(let i=0;i<N;i++){
      const px=Math.round(i*(extent-1)/(N-1)), py=Math.round(j*(extent-1)/(N-1));
      const k=(py*extent+px)*4; let h=decodeDem(data[k],data[k+1],data[k+2]);
      if(!Number.isFinite(h)){h=0;} else {valid++; minH=Math.min(minH,h); maxH=Math.max(maxH,h);}
      values[j*N+i]=h;
    }
    if(!Number.isFinite(minH)){minH=0;maxH=0;}
    state.lastDem={z,minX,minY,extent,values,N};
    clearRoot();
    const size=700; const scale=Number(document.getElementById('heightScale').value);
    const base=Number.isFinite(minH)?minH:0;
    const top=new Float32Array(N*N);
    for(let i=0;i<values.length;i++) top[i]=(values[i]-base)*scale;
    // 地形上面に地図画像テクスチャ
    const texture=new THREE.CanvasTexture(mapCanvas); texture.colorSpace=THREE.SRGBColorSpace;
    const geo=new THREE.PlaneGeometry(size,size,N-1,N-1);
    geo.rotateX(0);
    const pos=geo.attributes.position;
    for(let j=0;j<N;j++) for(let i=0;i<N;i++){
      const idx=j*N+i; pos.setZ(idx, top[idx]+1.0);
    }
    pos.needsUpdate=true; geo.computeVertexNormals();
    terrainMesh=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({map:texture,roughness:.95,metalness:0,side:THREE.DoubleSide}));
    rootGroup.add(terrainMesh);

    let cumulative=0;
    const mode=document.getElementById('layerMode').value;
    for(const ly of state.layers){
      const t=new Float32Array(N*N); const b=new Float32Array(N*N);
      for(let k=0;k<N*N;k++){
        const terrainZ = mode==='follow' ? top[k] : 0;
        t[k]=terrainZ - cumulative*scale;
        b[k]=terrainZ - (cumulative + ly.thickness)*scale;
      }
      cumulative += ly.thickness;
      const mat=new THREE.MeshStandardMaterial({color:ly.color,roughness:.8,metalness:0,transparent:true,opacity:.88,side:THREE.DoubleSide});
      const mesh=buildSurfaceMesh(N,size,t,b,mat); rootGroup.add(mesh);
    }
    const axes=new THREE.AxesHelper(180); axes.position.set(-size/2-25,-size/2-25,0); rootGroup.add(axes);
    controls.target.set(0,0,(maxH-minH)*scale*0.15); camera.position.set(0,-620,360); controls.update();
    status.textContent=`3D生成完了\n中心: ${state.center.lat.toFixed(6)}, ${state.center.lon.toFixed(6)} / z${z}\n標高範囲: ${minH.toFixed(1)}〜${maxH.toFixed(1)} m / 有効DEM点: ${valid}/${N*N}`;
    updateReadout(); renderColumn();
  }catch(e){
    console.error(e); status.textContent='読み込みに失敗しました。ネットワーク、CORS、または地理院タイルの取得制限を確認してください。\n' + e.message;
  }finally{btn.disabled=false;}
}

document.getElementById('goBtn').addEventListener('click',()=>{
  setCenter(Number(document.getElementById('lat').value),Number(document.getElementById('lon').value),Number(document.getElementById('zoom').value));
});
document.getElementById('buildBtn').addEventListener('click',build3D);
document.getElementById('layerMode').addEventListener('change',build3D);

buildLayerEditor(); renderColumn(); setup3D(); setCenter(init.lat, init.lon, init.zoom); updateReadout(); build3D();
</script>
</body>
</html>
